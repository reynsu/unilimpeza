version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns: ['astro', '@astrojs/*']
      preact:
        patterns: ['preact', '@preact/*']
      dev-tooling:
        patterns: ['typescript', 'lightningcss']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
