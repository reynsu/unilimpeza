version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns: ['astro', '@astrojs/*']
      preact:
        patterns: ['preact', '@preact/*']
      dev-tooling:
        patterns: ['typescript', 'lightningcss']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    ignore:
      # v5+ rewrites pnpm-lock.yaml to prepend pnpm metadata in a multi-doc
      # YAML format, which `pnpm install --frozen-lockfile` then rejects with
      # ERR_PNPM_BROKEN_LOCKFILE. Keep on v4 until the action stops mutating
      # our lockfile.
      - dependency-name: pnpm/action-setup
        update-types: [version-update:semver-major]
