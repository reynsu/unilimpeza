name: Dependabot auto-merge

# Auto-merges Dependabot PRs that touch minor + patch versions (and any
# GitHub Actions update) once CI passes. Major version bumps stay open
# for human review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    timeout-minutes: 2
    steps:
      - name: Inspect Dependabot update metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve safe updates
        if: >
          steps.meta.outputs.update-type != 'version-update:semver-major' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        if: >
          steps.meta.outputs.update-type != 'version-update:semver-major' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major bumps for review
        if: >
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.package-ecosystem != 'github_actions'
        run: |
          gh pr comment "$PR_URL" --body \
            ":warning: **Major version bump** (\`${{ steps.meta.outputs.dependency-names }}\` → ${{ steps.meta.outputs.new-version }}). Auto-merge is not enabled for major updates — review manually."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
