name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # v6 mangles large YAML files (injects `---` markers, invalidates pnpm-lock.yaml).
      # See: blob sha256=7a0aa8a… clean; checked-out tree sha256=9a38d84… with 2 extra
      # doc-start markers. v4 is stable.
      - uses: actions/checkout@v4

      # pnpm/action-setup@v6 injects a pnpm-metadata YAML document BEFORE the
      # real lockfile content (multi-doc with `---` separator), which pnpm 10's
      # `install --frozen-lockfile` rejects with ERR_PNPM_BROKEN_LOCKFILE.
      # v4 doesn't do this and reads `packageManager` from package.json cleanly.
      - uses: pnpm/action-setup@v4

      # v6 has a pnpm lockfile-hashing step that errors on v9.0 lockfiles
      # ("ERR_PNPM_BROKEN_LOCKFILE: expected a single document, found more").
      # v4 is stable and does the right thing with modern pnpm.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Report toolchain versions
        run: |
          echo "node=$(node --version)"
          echo "pnpm=$(pnpm --version)"
          grep packageManager package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro check (type + diagnostics)
        run: pnpm astro check

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error
