name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # v6 mangles large YAML files (injects `---` markers, invalidates pnpm-lock.yaml).
      # See: blob sha256=7a0aa8a… clean; checked-out tree sha256=9a38d84… with 2 extra
      # doc-start markers. v4 is stable.
      - uses: actions/checkout@v4

      # Reads version from `packageManager` in package.json
      - uses: pnpm/action-setup@v6

      # v6 has a pnpm lockfile-hashing step that errors on v9.0 lockfiles
      # ("ERR_PNPM_BROKEN_LOCKFILE: expected a single document, found more").
      # v4 is stable and does the right thing with modern pnpm.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Report toolchain versions
        run: |
          echo "node=$(node --version)"
          echo "pnpm=$(pnpm --version)"
          grep packageManager package.json

      - name: Diagnose lockfile
        run: |
          echo "size=$(wc -c < pnpm-lock.yaml)"
          echo "sha256=$(sha256sum pnpm-lock.yaml | awk '{print $1}')"
          echo "line-numbers-with-triple-dash:"
          grep -n -- '---' pnpm-lock.yaml | head -10 || true
          echo "git-ls-tree-HEAD:"
          git ls-tree HEAD -- pnpm-lock.yaml
          echo "git-hash-object:"
          git hash-object pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro check (type + diagnostics)
        run: pnpm astro check

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error
